name: Auto‑Update & Deploy

on:
  push:
    branches: [ '**' ]   # runs on every push to any branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---- checkout the repo (full history) ----
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- optional Node setup (remove if you don’t need it) ----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      # ---- install npm deps (if a package.json exists) ----
      - name: Install npm dependencies
        run: |
          npm ci || npm install

      # ---- add loading="lazy" to every <img> ----
      - name: Add lazy‑loading to images
        env:
          PYTHONUNBUFFERED: 1
        run: |
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup

          html_path = Path("index.html")
          if html_path.is_file():
              soup = BeautifulSoup(html_path.read_text(encoding="utf-8"), "html.parser")
              changed = False
              for img in soup.find_all("img"):
                  if not img.has_attr("loading"):
                      img["loading"] = "lazy"
                      changed = True
              if changed:
                  html_path.write_text(str(soup), encoding="utf-8")
                  print("✅ lazy‑loading added")
          PY

      # ---- commit any changes back to the same branch ----
      - name: Commit changes (if any)
        id: gitcommit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # abort if nothing changed
          if git diff --quiet && git diff --cached --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          git add -A
          git commit -m "chore: auto‑update after push [skip ci]"
          git push origin "${{ github.ref_name }}"
          echo "no_changes=false" >> $GITHUB_OUTPUT

      # ---- Deploy to GitHub Pages (optional) ----
      - name: Deploy to GitHub Pages
        if: steps.gitcommit.outputs.no_changes == 'false' || steps.gitcommit.outputs.no_changes == ''
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
